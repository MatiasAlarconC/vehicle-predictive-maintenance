name: vehicle_predictive_maintenance_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Gestión de estado
  provider: ^6.1.2

  # Navegación declarativa
  go_router: ^14.2.7

  # Cliente HTTP
  dio: ^5.7.0

  # Persistencia local
  shared_preferences: ^2.2.2
  
  # Gráficos
  fl_chart: ^0.68.0
  
  # Animaciones Lottie
  lottie: ^3.1.2

  # Estados de carga
  shimmer: ^3.0.0

  # Texto animado
  animated_text_kit: ^4.2.2
  
  # Formateo de fechas y números
  intl: ^0.20.0

  # Autenticación Clerk
  clerk_auth: ^0.0.15-beta
  path_provider: ^2.1.5

  # Fuentes de Google
  google_fonts: ^6.2.1

  # Iconos de Cupertino
  cupertino_icons: ^1.0.2

  # Renderizado SVG (logo Vera)
  flutter_svg: ^2.0.17

  # Visor de modelos 3D (.glb / .gltf)
  model_viewer_plus: ^1.7.0

  # Deep links (OAuth callback) y lanzar URLs
  app_links: ^6.3.2
  url_launcher: ^6.3.1

  # Selección de imágenes de la galería
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/images/vera_logo.svg
    - assets/models/

